name: Release to npm

# OIDC provenance publish (https://docs.npmjs.com/generating-provenance-statements)。
# 事前に npmjs.com の package settings で GitHub Actions を
# trusted publisher として登録しておくこと (NPM_TOKEN 不要)。
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or branch to publish (e.g. v0.1.0)"
        required: true
        default: "main"

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: npm publish --provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
